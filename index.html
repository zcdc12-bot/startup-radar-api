// Cache

const setC=(k,v,age=1800000)=>{CACHE[k]={v,ts:Date.now(),age};return v;};

const fmtD=t=>{const d=new Date(t*1000);return`${d.getDate()}/${d.getMonth()+1}`;};

// ── Render helper ──────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){
    if(c==null||c===false) continue;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  }
  return el;
}

// ── API ────────────────────────────────────────────────────────
async function ai(prompt,maxT=800){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxT,
        messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    return d.content?.map(c=>c.text||"").join("")||"";
  }catch{return"";}
}
async function parseJSON(txt){
  try{return JSON.parse(txt.replace(/```json|```/g,"").trim());}catch{return null;}
}
async function loadStock(sym,range="6mo"){
  const key=`s_${sym}_${range}`;
  const hit=getC(key);if(hit)return hit;
  const r=await fetch(`${PROXY}/api/stock?sym=${sym}&range=${range}`);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  if(!d?.price)throw new Error("No price in response");
  const result={symbol:sym,name:META[sym]?.n||sym,sector:META[sym]?.s||"",
    price:d.price,chgPct:d.chgPct,volume:d.volume,mktCap:d.mktCap,
    week52High:d.week52High,week52Low:d.week52Low,candles:d.candles||[],source:"yahoo"};
  setC(key,result);
  enrichMeta(sym,result.price);
  return result;
}
async function enrichMeta(sym,price){
  const key=`meta_${sym}`;if(getC(key))return;
  const txt=await ai(`Stock ${sym} ~$${price}. JSON only:\n{"pe":X,"rating":"Strong Buy|Buy|Hold|Sell","target":X,"description":"2 sentences Hebrew"}`,300);
  const d=await parseJSON(txt);if(d)setC(key,d,86400000);
}

// ── Correlations ───────────────────────────────────────────────
function calcCorr(candles){
  if(!candles||candles.length<10)return null;
  const P=candles.map(c=>c.c).filter(Boolean);
  const V=candles.map(c=>c.v).filter(Boolean);
  const n=Math.min(P.length,V.length);
  const pm=P.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const vm=V.slice(0,n).reduce((a,b)=>a+b,0)/n;
  let cov=0,sp=0,sv=0;
  for(let i=0;i<n;i++){cov+=(P[i]-pm)*(V[i]-vm);sp+=(P[i]-pm)**2;sv+=(V[i]-vm)**2;}
  const pvCorr=sp&&sv?cov/Math.sqrt(sp*sv):0;
  const avgV=V.reduce((a,b)=>a+b,0)/n;
  let upV=0,upC=0,dnV=0,dnC=0,spUp=0,spT=0;
  for(let i=1;i<n;i++){
    if(P[i]>P[i-1]){upV+=V[i];upC++;}else{dnV+=V[i];dnC++;}
    if(V[i]>avgV*1.8){spT++;if(i+2<n&&P[i+2]>P[i])spUp++;}
  }
  const volRatio=dnC?(upV/Math.max(upC,1))/(dnV/Math.max(dnC,1)):1;
  const spikePct=spT?(spUp/spT*100).toFixed(0):"—";
  return{pvCorr:pvCorr.toFixed(2),volRatio:volRatio.toFixed(2),spikePct,spT,spUp,n};
}

function detectAnomalies(candles){
  if(!candles||candles.length<15)return[];
  const vols=candles.map(c=>c.v||0);
  const avg=vols.reduce((a,b)=>a+b,0)/vols.length;
  const std=Math.sqrt(vols.reduce((s,v)=>s+(v-avg)**2,0)/vols.length)||1;
  const ev=[];let last=-10;
  for(let i=5;i<candles.length-3;i++){
    if(i-last<10)continue;
    const v=candles[i].v||0,z=(v-avg)/std;
    if(z>1.5){
      const prev=candles[Math.max(0,i-2)].c||candles[i].c;
      const chg=(candles[i].c-prev)/prev*100;
      const fwd=(candles[Math.min(i+8,candles.length-1)].c-candles[i].c)/candles[i].c*100;
      ev.push({idx:i,type:chg>=0?"buy":"sell",price:candles[i].c,
        vol:candles[i].v,z:z.toFixed(1),fwdChg:+(fwd.toFixed(1))});
      last=i;
    }
  }
  return ev.slice(0,8);
}

// ── SVG Chart (vanilla JS) ──────────────────────────────────────
function buildChart(candles, anomalies, sym, W) {
  const PH=130, VH=36, YW=52, CW=W-YW, VOFF=PH+16, TH=VOFF+VH+20;
  const mn=Math.min(...candles.map(c=>c.l||c.c))*0.998;
  const mx=Math.max(...candles.map(c=>c.h||c.c))*1.002;
  const vmx=Math.max(...candles.map(c=>c.v))||1;
  const avgV=candles.map(c=>c.v||0).reduce((a,b)=>a+b,0)/candles.length;
  const pos=candles[candles.length-1]?.c>=candles[0]?.c;
  const p2y=v=>12+(1-(v-mn)/(mx-mn||1))*(PH-20);
  const i2x=i=>YW+(i/(candles.length-1))*CW;
  const bW=Math.max(1,CW/candles.length-.5);

  const pts=candles.map((c,i)=>`${i2x(i)},${p2y(c.c)}`).join(" ");
  const pLine=`M${pts.split(" ").join(" L")}`;
  const pArea=pLine+` L${i2x(candles.length-1)},${PH} L${YW},${PH} Z`;

  const uid=`${sym}${Date.now()}`;
  let maPath="";
  const yLbls=Array.from({length:5},(_,i)=>{const v=mn+(mx-mn)*i/4;return{v,y:p2y(v)};}).reverse();
  const xIdxs=[0,Math.floor(candles.length*.25),Math.floor(candles.length*.5),Math.floor(candles.length*.75),candles.length-1];

  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("width",W); svg.setAttribute("height",TH);
  svg.style.display="block"; svg.style.userSelect="none";

  const mk=(tag,attrs)=>{const e=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e;};
  const txt=(tag,attrs,text)=>{const e=mk(tag,attrs);e.textContent=text;return e;};

  // defs
  const defs=mk("defs",{});
  const grad=mk("linearGradient",{id:`g${uid}`,x1:"0",y1:"0",x2:"0",y2:"1"});
  const s1=mk("stop",{"offset":"0%","stop-color":pos?C.green:C.red,"stop-opacity":"0.2"});
  const s2=mk("stop",{"offset":"100%","stop-color":pos?C.green:C.red,"stop-opacity":"0"});
  const clip=mk("clipPath",{id:`c${uid}`});
  const clipR=mk("rect",{x:YW,y:0,width:CW,height:TH});
  clip.appendChild(clipR); grad.append(s1,s2); defs.append(grad,clip); svg.appendChild(defs);

  // Y axis bg
  svg.appendChild(mk("rect",{x:0,y:0,width:YW-1,height:TH,fill:"#05050c"}));
  svg.appendChild(mk("line",{x1:YW,y1:0,x2:YW,y2:TH,stroke:C.border,"stroke-width":"1"}));

  // Y labels + grid
  for(const l of yLbls){
    svg.appendChild(mk("line",{x1:YW,y1:l.y,x2:W,y2:l.y,stroke:"#0e0e22","stroke-width":"1"}));
    svg.appendChild(txt("text",{x:YW-4,y:l.y+4,"text-anchor":"end","font-size":"8",fill:"#3a4060"},"$"+(l.v>=1000?l.v.toFixed(0):l.v.toFixed(1))));
  }

  // Volume area
  svg.appendChild(mk("line",{x1:YW,y1:VOFF,x2:W,y2:VOFF,stroke:"#0e0e22","stroke-width":"1"}));
  svg.appendChild(mk("line",{x1:YW,y1:VOFF+VH,x2:W,y2:VOFF+VH,stroke:"#0e0e22","stroke-width":"1"}));
  svg.appendChild(txt("text",{x:YW+4,y:VOFF+11,"font-size":"8",fill:"#1e2540"},"VOL"));

  // X labels
  for(const i of xIdxs){
    svg.appendChild(txt("text",{x:i2x(i),y:VOFF+VH+14,"text-anchor":"middle","font-size":"7.5",fill:"#3a4060"},fmtD(candles[i]?.t||0)));
  }

  // Vol bars
  const volG=mk("g",{"clip-path":`url(#c${uid})`});
  for(let i=0;i<candles.length;i++){
    const v=candles[i].v||0, bh=Math.max(2,(v/vmx)*(VH-3));
    const an=(anomalies||[]).find(a=>a.idx===i);
    const sp=v>avgV*1.75;
    const fill=an?(an.type==="buy"?C.green:C.red):sp?C.accent:"#1a1a30";
    const op=an?.95:sp?.7:.4;
    const r=mk("rect",{x:i2x(i)-bW/2,y:VOFF+VH-2-bh,width:bW,height:bh,fill,opacity:op});
    volG.appendChild(r);
  }
  svg.appendChild(volG);

  // Price area + line
  const priceG=mk("g",{"clip-path":`url(#c${uid})`});
  priceG.appendChild(mk("path",{d:pArea,fill:`url(#g${uid})`}));
  priceG.appendChild(mk("path",{d:pLine,fill:"none",stroke:pos?C.green:C.red,"stroke-width":"2","stroke-linejoin":"round"}));
  svg.appendChild(priceG);

  // Anomaly markers
  const anG=mk("g",{"clip-path":`url(#c${uid})`});
  for(const an of (anomalies||[])){
    const x=i2x(an.idx), y=p2y(an.price), col=an.type==="buy"?C.green:C.red, B=an.type==="buy";
    const vbh=Math.max(2,((candles[an.idx]?.v||0)/vmx)*(VH-3));
    const volY=VOFF+VH-2-vbh, tagY=B?y-28:y+10;
    anG.appendChild(mk("line",{x1:x,y1:B?y+7:y-7,x2:x,y2:volY,stroke:col,"stroke-width":"1.2","stroke-dasharray":"4,3",opacity:".45"}));
    anG.appendChild(mk("circle",{cx:x,cy:y,r:9,fill:col,opacity:".12"}));
    anG.appendChild(mk("circle",{cx:x,cy:y,r:6,fill:col,opacity:".95"}));
    const bl=txt("text",{x:x,y:y+1,"text-anchor":"middle","dominant-baseline":"middle","font-size":"7","font-weight":"900",fill:"#000"},B?"B":"S");
    anG.appendChild(bl);
    const tr=mk("rect",{x:x-20,y:tagY,width:40,height:14,rx:4,fill:col,opacity:".9"});
    anG.appendChild(tr);
    anG.appendChild(txt("text",{x:x,y:tagY+10,"text-anchor":"middle","font-size":"6.5","font-weight":"700",fill:"#000"},`z=${an.z}σ`));
  }
  svg.appendChild(anG);

  // Current price
  const curY=p2y(candles[candles.length-1]?.c||0);
  svg.appendChild(mk("line",{x1:YW,y1:curY,x2:W,y2:curY,stroke:"#fff","stroke-width":".7","stroke-dasharray":"5,4",opacity:".15"}));
  svg.appendChild(mk("rect",{x:0,y:curY-8,width:YW-1,height:16,fill:pos?C.green:C.red,opacity:".9"}));
  svg.appendChild(txt("text",{x:YW/2,y:curY+4,"text-anchor":"middle","font-size":"8.5","font-weight":"900",fill:"#000"},"$"+(candles[candles.length-1]?.c?.toFixed(1)||"")));

  return {svg, pos};
}

// ── State ──────────────────────────────────────────────────────

  aiQ:"", aiAns:null, aiL:false, search:""

}

    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},

        const cd=getC(`s_${sym}_6mo`), price=cd?.price, pct=cd?.chgPct||0, pos=pct>=0;

        h("button",{className:"tap",style:{marginTop:12,width:"100%",background:`${C.accent}20`,border:`1px solid ${C.accent}`,borderRadius:8,padding:"8px 0",color:C.accent,fontSize:12,fontWeight:700,cursor:"pointer"},onclick:()=>loadStockAndShow(s.sel)},"↺ נסה שוב")
      ));
    } else if(s.sd){
      const sd=s.sd, em=getC(`meta_${s.sel}`), pos=(sd.chgPct||0)>=0;

      // Quote card
      const quoteCard = h("div",{className:"card"},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          h("div",{},
            h("div",{style:{fontWeight:900,fontSize:22,color:"#fff"}},sd.symbol),
            h("div",{style:{fontSize:11,color:C.muted}},`${sd.name} · ${sd.sector}`),
            em?.rating?h("span",{className:"tag",style:{color:RC(em.rating),background:RC(em.rating)+"20",marginTop:4}},em.rating):null
          ),
          h("div",{style:{textAlign:"left"}},
            h("div",{style:{fontWeight:900,fontSize:24,color:"#fff"}},`$${(+sd.price||0).toFixed(2)}`),
            h("div",{style:{color:pos?C.green:C.red,fontSize:13,fontWeight:700}},`${pos?"▲":"▼"}${Math.abs(sd.chgPct||0).toFixed(2)}%`),
            em?.target?h("div",{style:{fontSize:10,color:C.muted}},`יעד: $${em.target}`):null
          )
        ),
        em?.description?h("div",{style:{fontSize:11,color:"#8898aa",marginTop:10,lineHeight:1.6,padding:"7px 10px",background:"#07070f",borderRadius:7}},em.description):null,
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginTop:10}},
          ...[{l:"שווי שוק",v:fV(sd.mktCap)},{l:"P/E",v:em?.pe||"—"},{l:"52W שיא",v:sd.week52High?`$${(+sd.week52High).toFixed(0)}`:"—"},{l:"52W שפל",v:sd.week52Low?`$${(+sd.week52Low).toFixed(0)}`:"—"},{l:"נפח",v:fV(sd.volume)},{l:"שינוי",v:`${pos?"+":""}${(sd.chgPct||0).toFixed(2)}%`}].map(i=>
            h("div",{style:{background:"#07070f",borderRadius:7,padding:"6px 8px",textAlign:"center"}},
              h("div",{style:{fontSize:8,color:C.muted}},i.l),
              h("div",{style:{fontSize:11,fontWeight:700,color:"#e0e0f0",marginTop:2}},i.v)
            )
          )
        )
      );
      content.appendChild(quoteCard);

      // Chart
      const chartCard = h("div",{className:"card"});
      chartCard.appendChild(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}},
        h("div",{style:{fontSize:10,color:C.green,fontWeight:700}},"📊 Yahoo Finance — נתונים אמיתיים"),
        h("div",{style:{fontSize:9,color:C.muted}},`${sd.candles?.length||0} נרות`)
      ));
      // Range buttons
      chartCard.appendChild(h("div",{style:{display:"flex",gap:4,marginBottom:8}},
        ...TRS.map((t,i)=>h("button",{className:"tap",style:{flex:1,background:s.trIdx===i?`${C.accent}25`:"transparent",border:`1px solid ${s.trIdx===i?C.accent:C.border}`,borderRadius:7,padding:"5px 0",color:s.trIdx===i?C.accent:C.muted,fontSize:11,fontWeight:700,cursor:"pointer"},onclick:()=>{setState({trIdx:i});loadStockAndShow(s.sel,TRS[i].r);}},t.l))
      ));
      if(sd.candles?.length>2){
        const W = Math.min(window.innerWidth-24, 456);
        const {svg} = buildChart(sd.candles, s.anomalies, s.sel, W);
        chartCard.appendChild(svg);
        chartCard.appendChild(h("div",{style:{display:"flex",gap:8,padding:"3px 4px",fontSize:8.5,marginTop:4,flexWrap:"wrap"}},
          h("span",{style:{color:pos?C.green:C.red}},"─ Yahoo Finance"),
          h("span",{style:{color:C.green}},"● B נפח⬆"),

      }
      content.appendChild(chartCard);

      // Correlations
      const corr=calcCorr(sd.candles);
      if(corr){
        const corrCard = h("div",{className:"card"},
          h("div",{style:{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,marginBottom:10}},`📊 קורלציות אמיתיות — ${corr.n} ימים`),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}},
            ...[{l:"קורלציה מחיר-נפח",v:corr.pvCorr,c:Math.abs(corr.pvCorr)>.6?C.green:Math.abs(corr.pvCorr)>.3?C.yellow:C.red},

               {l:"Spike→עלייה",v:corr.spikePct+"%",c:+corr.spikePct>=60?C.green:C.yellow},

              h("div",{style:{background:"#07070f",borderRadius:8,padding:"8px 10px"}},
                h("div",{style:{fontSize:8,color:C.muted,marginBottom:3}},i.l),
                h("div",{style:{fontSize:18,fontWeight:900,color:i.c}},i.v)
              )
            )
          ),
          h("div",{style:{padding:"8px 10px",background:`${corr.volRatio>1.1?C.green:C.red}18`,border:`1px solid ${corr.volRatio>1.1?C.green:C.red}30`,borderRadius:8}},
            h("span",{style:{fontSize:11,color:corr.volRatio>1.1?C.green:C.red,fontWeight:700}},corr.volRatio>1.1?"💡 נפח גבוה ביום עלייה — bullish":"⚠️ נפח גבוה ביום ירידה — bearish")
          )

      }

      // AI button
      if(!s.ana){
        const aiBtn = h("button",{className:"tap btn",style:{width:"100%",background:s.anaL?`${C.accent}20`:"linear-gradient(135deg,#7c6aff,#00f5c4)",color:s.anaL?"#888":"#000",marginBottom:10},
          onclick:async()=>{
            if(s.anaL)return;
            setState({anaL:true});
            const a=await ai(`ניתוח ${s.sel} בעברית, 4 נקודות מעשיות:\nמחיר: $${sd.price?.toFixed(2)}, שינוי: ${sd.chgPct?.toFixed(2)}%\n52W: $${sd.week52Low?.toFixed(0)}–$${sd.week52High?.toFixed(0)}\n${corr?`קורלציה: ${corr.pvCorr}, נפח: ${corr.volRatio}x`:""}`,700);
            setState({ana:a,anaL:false});
          }},s.anaL?"🤖 מנתח...":"🤖 ניתוח מלא + קורלציות");
        content.appendChild(aiBtn);
      } else {
        content.appendChild(h("div",{className:"card",style:{marginBottom:10}},
          h("div",{style:{fontSize:11,color:C.green,fontWeight:700,marginBottom:6}},`🤖 ${s.sel} — Yahoo Finance + Claude`),
          h("div",{style:{fontSize:12,color:"#c0c8d8",lineHeight:1.9,whiteSpace:"pre-wrap"}},s.ana)
        ));
      }
    }
  }

  // ── VOLUME ──
  if(s.tab==="vol"){
    content.appendChild(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
      h("div",{},
        h("div",{style:{fontWeight:900,fontSize:18,color:"#fff"}},"🔥 Volume Spikes"),
        h("div",{style:{fontSize:10,color:C.muted}},"נתונים אמיתיים מ-Yahoo Finance")
      ),
      h("button",{className:"tap",style:{background:`${C.accent}20`,border:`1px solid ${C.accent}`,borderRadius:8,padding:"7px 14px",color:s.volL?"#888":C.accent,fontSize:11,fontWeight:700,cursor:"pointer"},
        onclick:scanVolume},s.volL?"⏳ סורק...":"🔍 סרוק")
    ));
    if(s.volL) content.appendChild(h("div",{style:{textAlign:"center",padding:40,animation:"pulse 1.2s infinite",color:C.muted}},h("div",{style:{fontSize:32,marginBottom:8}},"📡"),h("div",{style:{fontSize:13,color:"#fff"}},"מושך נתוני נפח אמיתיים...")));
    if(s.volRes.length>0&&!s.volL){
      content.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}},
        ...[{l:"🔴 >3x",v:s.volRes.filter(v=>v.ratio>=3).length,c:C.red},{l:"🟡 2-3x",v:s.volRes.filter(v=>v.ratio>=2&&v.ratio<3).length,c:C.yellow},{l:"📈 קנייה",v:s.volRes.filter(v=>v.type==="buy").length,c:C.green}].map(i=>
          h("div",{style:{background:C.card,border:`1px solid ${i.c}30`,borderRadius:9,padding:"8px",textAlign:"center"}},h("div",{style:{fontSize:9,color:C.muted}},i.l),h("div",{style:{fontSize:22,fontWeight:900,color:i.c}},i.v))
        )
      ));
      const filt=s.vfilt==="הכל"?s.volRes:s.volRes.filter(v=>s.vfilt==="buy"?v.type==="buy":s.vfilt==="sell"?v.type==="sell":v.urgency==="high");
      content.appendChild(h("div",{style:{display:"flex",gap:5,marginBottom:10}},
        ...["הכל","buy","sell","high"].map(f=>h("button",{className:"tap",style:{background:s.vfilt===f?`${C.accent}20`:"transparent",border:`1px solid ${s.vfilt===f?C.accent:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,color:s.vfilt===f?C.accent:C.muted,fontWeight:700,cursor:"pointer"},onclick:()=>setState({vfilt:f})},f==="הכל"?"הכל":f==="buy"?"📈 קנייה":f==="sell"?"📉 מכירה":"🔴 קיצוני"))
      ));
      if(!s.vaiN){
        content.appendChild(h("button",{className:"tap",style:{width:"100%",background:`${C.accent}15`,border:`1px solid ${C.accent}40`,borderRadius:9,padding:"8px 0",color:s.vaiL?"#888":C.accent,fontWeight:700,fontSize:12,marginBottom:10,cursor:"pointer"},
          onclick:async()=>{if(s.vaiL)return;setState({vaiL:true});const top=s.volRes.slice(0,8).map(v=>`${v.symbol}(${v.ratio.toFixed(1)}x,${v.chgPct?.toFixed(1)}%)`).join(";");const n=await ai(`ניתח volume spikes אמיתיים בעברית, 3 משפטים: ${top}`,400);setState({vaiN:n,vaiL:false});}},s.vaiL?"🤖 מנתח...":"🤖 מה מסמנים הנפחים?"));
      } else {
        content.appendChild(h("div",{className:"card",style:{marginBottom:10}},h("div",{style:{fontSize:12,color:"#c0c8d8",lineHeight:1.8}},s.vaiN)));
      }
      for(const v of filt){
        const uc=v.urgency==="high"?C.red:v.urgency==="medium"?C.orange:C.yellow, p=(v.chgPct||0)>=0;
        content.appendChild(h("div",{className:"tap",style:{background:C.card,border:`1px solid ${uc}35`,borderRadius:11,padding:"10px 12px",marginBottom:7,display:"flex",alignItems:"center",justifyContent:"space-between"},onclick:()=>loadStockAndShow(v.symbol)},
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("div",{style:{width:36,height:36,background:`${uc}20`,border:`1.5px solid ${uc}50`,borderRadius:9,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}},
              h("span",{style:{fontSize:9,color:uc,fontWeight:900}},v.ratio.toFixed(1)+"x"),h("span",{style:{fontSize:7,color:uc}},"VOL")
            ),
            h("div",{},
              h("div",{style:{display:"flex",gap:5,alignItems:"center"}},h("span",{style:{fontWeight:900,fontSize:14,color:"#fff"}},v.symbol),h("span",{style:{fontSize:9,color:p?C.green:C.red}},p?"📈":"📉")),
              h("div",{style:{fontSize:9,color:C.muted}},v.name),
              h("div",{style:{fontSize:9,color:C.accent}},`Yahoo: ${v.ratio.toFixed(1)}x ממוצע 20 יום`)
            )
          ),
          h("div",{style:{textAlign:"left"}},
            h("div",{style:{fontWeight:700,fontSize:13,color:"#fff"}},`$${(+v.price||0).toFixed(2)}`),
            h("div",{style:{color:p?C.green:C.red,fontSize:11,fontWeight:700}},`${p?"▲":"▼"}${Math.abs(v.chgPct||0).toFixed(2)}%`)
          )
        ));
      }
    }
    if(s.volRes.length===0&&!s.volL) content.appendChild(h("div",{style:{textAlign:"center",padding:50,color:C.muted}},h("div",{style:{fontSize:36,marginBottom:12}},"🔍"),h("div",{style:{fontSize:14,color:"#fff"}},"לחץ 'סרוק' לנתוני נפח אמיתיים")));
  }

  // ── SCANNER ──
  if(s.tab==="scanner"){
    content.appendChild(h("div",{style:{fontWeight:900,fontSize:18,color:"#fff",marginBottom:8}},"סורק 🔍"));
    content.appendChild(h("div",{style:{display:"flex",gap:5,overflowX:"auto",marginBottom:10,paddingBottom:2}},
      ...Object.keys(GROUPS).map(k=>h("button",{className:"tap",style:{whiteSpace:"nowrap",background:s.sgr===k?`${C.accent}20`:"transparent",border:`1px solid ${s.sgr===k?C.accent:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,color:s.sgr===k?C.accent:C.muted,fontWeight:700,cursor:"pointer"},onclick:()=>setState({sgr:k,agr:null})},k))
    ));
    content.appendChild(h("button",{className:"tap",style:{width:"100%",background:s.agrL?`${C.accent}20`:`${C.accent}15`,border:`1px solid ${C.accent}40`,borderRadius:9,padding:"8px 0",color:s.agrL?"#888":C.accent,fontWeight:700,fontSize:12,marginBottom:s.agr?8:10,cursor:"pointer"},
      onclick:async()=>{if(s.agrL)return;setState({agrL:true});const t=await ai(`ניתח סקטור בעברית 3 משפטים: ${GROUPS[s.sgr].join(",")}`,500);setState({agr:t,agrL:false});}},s.agrL?"🤖 מנתח...":"🤖 ניתוח AI לסקטור"));
    if(s.agr) content.appendChild(h("div",{className:"card",style:{marginBottom:10}},h("div",{style:{fontSize:12,color:"#c0c8d8",lineHeight:1.8}},s.agr)));
    content.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
      ...(GROUPS[s.sgr]||[]).map(sym=>{
        const cd=getC(`s_${sym}_6mo`),price=cd?.price,pct=cd?.chgPct||0;
        return h("div",{className:"tap",style:{background:C.card,border:`1px solid ${cd?C.accent+"40":C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"},onclick:()=>loadStockAndShow(sym)},
          h("div",{},
            h("div",{style:{fontWeight:900,fontSize:14,color:"#fff"}},sym),
            price?h("div",{style:{fontSize:10,color:pct>=0?C.green:C.red,fontWeight:700}},`$${(+price).toFixed(1)} ${pct>=0?"▲":"▼"}${Math.abs(pct).toFixed(1)}%`):h("div",{style:{fontSize:9,color:C.muted}},"לחץ לטעינה"),
            cd?h("div",{style:{fontSize:8,color:C.accent}},"✓ Yahoo"):null
          ),
          h("div",{style:{color:C.accent,fontSize:18}},"›")
        );
      })
    ));
  }

  // ── AI ──
  if(s.tab==="ai"){
    content.appendChild(h("div",{style:{fontWeight:900,fontSize:18,color:"#fff",marginBottom:8}},"יועץ AI 🤖"));
    content.appendChild(h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}},
      ...["NVDA קורלציה","TSLA תמיכה","מי הכי חזק?","CRWD breakout?"].map(q=>h("span",{className:"tap",style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,color:C.muted,cursor:"pointer"},onclick:()=>setState({aiQ:q})},q))
    ));
    const ta=h("textarea",{style:{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"11px 12px",color:"#e0e0f0",fontSize:13,resize:"none",direction:"rtl",lineHeight:1.6,marginBottom:8},placeholder:"שאל כל שאלה על מסחר...",rows:4});
    ta.value=s.aiQ; ta.addEventListener("input",e=>state.aiQ=e.target.value);
    content.appendChild(ta);
    content.appendChild(h("button",{className:"tap btn",style:{width:"100%",background:s.aiL||!s.aiQ.trim()?`${C.accent}30`:"linear-gradient(135deg,#7c6aff,#00f5c4)",color:s.aiL||!s.aiQ.trim()?"#888":"#000",marginBottom:10},
      onclick:async()=>{if(s.aiL||!s.aiQ.trim())return;setState({aiL:true,aiAns:null});const a=await ai(`ענה בעברית קצר ומעשי: ${s.aiQ}`,700);setState({aiAns:a,aiL:false});}},s.aiL?"🤖 חושב...":"שאל ⚡"));
    if(s.aiAns) content.appendChild(h("div",{className:"card"},h("div",{style:{fontSize:13,color:"#c0c8d8",lineHeight:1.9,whiteSpace:"pre-wrap"}},s.aiAns)));
  }

  content.appendChild(h("div",{style:{height:30}}));
  app.appendChild(content);
}

// ── Actions ────────────────────────────────────────────────────
async function loadStockAndShow(sym, range) {
  const r = range || TRS[state.trIdx].r;
  setState({sel:sym,tab:"stocks",loading:true,sd:null,anomalies:[],err:null,ana:null});
  try {
    const d = await loadStock(sym, r);
    setState({sd:d, anomalies:detectAnomalies(d.candles), loading:false});
  } catch(e) {
    setState({err:`${e.message}\n${PROXY}/api/stock?sym=${sym}`, loading:false});
  }
}

async function scanVolume() {
  if(state.volL) return;
  setState({volL:true, volRes:[], vaiN:null});
  const syms=[...new Set(Object.values(GROUPS).flat())];
  const results=[];
  for(const sym of syms){
    try{
      const d=await loadStock(sym,"1mo");
      if(!d?.candles?.length) continue;
      const c=d.candles, n=c.length;
      if(n<22) continue;
      const avg20=c.slice(n-21,n-1).reduce((a,x)=>a+(x.v||0),0)/20;
      const todayVol=c[n-1].v||0;
      if(!avg20) continue;
      const ratio=todayVol/avg20;
      if(ratio>=1.5) results.push({symbol:sym,name:META[sym]?.n||sym,price:d.price,chgPct:d.chgPct,
        todayVol,avgVol:avg20,ratio:+ratio.toFixed(2),type:d.chgPct>=0?"buy":"sell",
        urgency:ratio>=3?"high":ratio>=2?"medium":"low",sector:META[sym]?.s||""});
    }catch{}
  }
  results.sort((a,b)=>b.ratio-a.ratio);
  setState({volRes:results, volL:false});
}

// ── Init ────────────────────────────────────────────────────────
render();
</script>
